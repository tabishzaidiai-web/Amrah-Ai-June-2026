    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: { 950: '#022c22' },
                        gold: { DEFAULT: '#D4AF37', hover: '#C5A028' },

    <style>
        body { background-color: #ffffff; color: #022c22; scroll-behavior: smooth; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .soft-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }
        .btn-luxury { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-luxury:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(212, 175, 55, 0.15); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-lux-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #fdfdfd; }
        ::-webkit-scrollbar-thumb { background: #022c22; border-radius: 10px; }
    </style>
